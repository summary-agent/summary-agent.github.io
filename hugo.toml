# Production domain. The GitHub Pages workflow (.github/workflows/hugo.yml)
# re-injects the Pages base URL at deploy time, so this value mainly affects
# local builds — but it should match the real custom domain (see static/CNAME).
baseURL = 'https://summary-agent.io/'
locale = 'en-us'
title = 'Summary Agent'

# Single landing page — no tag/category pages.
disableKinds = ['taxonomy', 'term']

[services]
  [services.googleAnalytics]
    # GA4 Measurement ID (Google Analytics → Admin → Data Streams → web stream).
    ID = 'G-TM4ZENWKXV'

[params]
  tagline = 'Stop reading every PR'
  description = "An AI-written daily digest, personal to each teammate — your team's GitHub, Jira, Slack, and more, tuned to what you care about with your own work broken out, ready for standup."

  # PLACEHOLDER — replace with your real Google Form embed URL.
  # In Google Forms: Send → < > (embed) → copy the src of the iframe.
  # It looks like: https://docs.google.com/forms/d/e/<long-id>/viewform?embedded=true
  googleFormEmbedUrl = 'https://docs.google.com/forms/d/e/REPLACE_WITH_YOUR_FORM_ID/viewform?embedded=true'
